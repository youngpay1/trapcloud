<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Trapcloud — US Rap &amp; Hip-Hop Concerts in Europe</title>
    <meta name="description" content="Trapcloud books American trap and hip-hop artists for concerts and events across Europe. Shows in Cologne, Berlin, Moscow and beyond." />
    <meta name="keywords" content="Trapcloud, US rap Europe, hip hop concerts Germany, trap concerts Cologne, trap concerts Berlin, American rapper booking Europe, hip hop booking agency" />
    <meta name="author" content="Trapcloud" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://trapcloud.eu" />
    <link rel="icon" href="/trapcloud-logo.png" type="image/png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trapcloud.eu" />
    <meta property="og:title" content="Trapcloud — US Rap &amp; Hip-Hop Concerts in Europe" />
    <meta property="og:description" content="Trapcloud books American trap and hip-hop artists for concerts and events across Europe. Shows in Cologne, Berlin, Moscow and beyond." />

    <meta property="og:site_name" content="Trapcloud" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trapcloud — US Rap &amp; Hip-Hop Concerts in Europe" />
    <meta name="twitter:description" content="Trapcloud books American trap and hip-hop artists for concerts and events across Europe." />
    <meta name="twitter:image" content="https://trapcloud.eu/trapcloud-logo.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Trapcloud",
      "url": "https://trapcloud.eu",
      "logo": "https://trapcloud.eu/trapcloud-logo.png",
      "description": "Trapcloud books American trap and hip-hop artists for concerts and events across Europe.",
      "email": "info@trapcloud.eu",
      "sameAs": [
        "https://www.instagram.com/trapcloud.eu"
      ],
      "areaServed": [
        { "@type": "City", "name": "Cologne" },
        { "@type": "City", "name": "Berlin" },
        { "@type": "City", "name": "Moscow" },
        { "@type": "City", "name": "Saint Petersburg" }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
